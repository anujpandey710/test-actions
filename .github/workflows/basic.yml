name: Anuj CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: myapp
  AWS_REGION: ap-south-1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Display Message
        run: echo "Hello from GitHub Actions!"

      - name: Check Current Directory
        run: pwd

      - name: List Files
        run: ls -l
        
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Display Message
        run: echo "Hi"

      - name: Print variables
        run: |
          echo "APP: $APP_NAME"
          echo "Region: $AWS_REGION" 

      - name: use secret
        run: echo "API_KEY ${{ secrets.AWS_ACESSS_KEY}}"
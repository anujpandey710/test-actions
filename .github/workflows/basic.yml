name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Display Message
        run: echo "Hello from GitHub Actions!"

      - name: Check Current Directory
        run: pwd

      - name: List Files
        run: ls -l